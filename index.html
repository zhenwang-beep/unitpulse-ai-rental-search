<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UnitPulse Rental Search</title>
    <meta name="application-name" content="UnitPulse Rental Search" />
    <meta name="description" content="UnitPulse – AI-powered rental search. Find your perfect home through natural conversation." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #000000;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333333;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      @keyframes shimmer-border {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .shimmer-border-container {
        position: relative;
        padding: 2px;
        overflow: hidden;
        border-radius: 9999px;
      }
      .shimmer-border-bg {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
          from 0deg,
          transparent 0%,
          #4285f4 15%,
          #9b72cb 30%,
          #d96570 45%,
          #f4af54 60%,
          #9b72cb 75%,
          #4285f4 90%,
          transparent 100%
        );
        animation: shimmer-border 4s linear infinite;
        filter: blur(10px);
        opacity: 0.6;
      }
      @keyframes breathing {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .animate-breathing {
        animation: breathing 3s ease-in-out infinite;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-black antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
