<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UnitPulse Rental Search</title>
    <meta name="application-name" content="UnitPulse Rental Search" />
    <meta name="description" content="UnitPulse – AI-powered rental search. Find your perfect home through natural conversation." />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              heading: ['"Manrope"', 'sans-serif'],
            },
            colors: {
              // Olive (primary brand). Semantic tokens — see design.md.
              brand: {
                DEFAULT: '#4A5D23',
                hover: '#3a4e1a',
                'on-dark': '#A8B97D',  // For use on bg-black / dark surfaces
                text: '#243510',       // Body text on AI tint
                heading: '#1a2609',    // Headings on AI tint
              },
              // Cream/warm-neutral surfaces.
              surface: {
                app: '#FCF9F8',        // App background, sticky bars, modal panels
                '2': '#F4F1EE',        // Pricing tables, amenity chips, tag bg
                ai: '#F4F7EC',         // AI Lifestyle Match, olive-accent info sections
                footer: '#F0EDEA',     // Landing page footer
              },
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #000000;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333333;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      @keyframes shimmer-border {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .shimmer-border-container {
        position: relative;
        padding: 2px;
        overflow: hidden;
        border-radius: 9999px;
      }
      .shimmer-border-bg {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
          from 0deg,
          transparent 0%,
          #4285f4 15%,
          #9b72cb 30%,
          #d96570 45%,
          #f4af54 60%,
          #9b72cb 75%,
          #4285f4 90%,
          transparent 100%
        );
        animation: shimmer-border 4s linear infinite;
        filter: blur(10px);
        opacity: 0.6;
      }
      @keyframes breathing {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .animate-breathing {
        animation: breathing 3s ease-in-out infinite;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-black antialiased overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
